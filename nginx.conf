worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 80;

        # Allow large uploads (vehicle/driver photos). The default 1m caused
        # nginx to reject phone photos with "413 Request Entity Too Large"
        # before they ever reached Appwrite. Keep in sync with Appwrite's
        # _APP_STORAGE_LIMIT.
        client_max_body_size 30m;

        location /v1/ {
            proxy_pass http://appwrite-ljdtlive600781krllbzu915/v1/;
            proxy_set_header Host appwrite-ljdtlive600781krllbzu915.187.127.156.240.sslip.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for realtime
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
