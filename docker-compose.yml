services:
  coolpool-frontend:
    build:
      context: .
      # Pass every VITE_* var as a build arg so Vite inlines them at build time.
      # The secrets file is sourced by deploy.sh before this runs.
      args:
        - VITE_APPWRITE_ENDPOINT
        - VITE_APPWRITE_PROJECT_ID
        - VITE_APPWRITE_DATABASE_ID
        - VITE_APPWRITE_COLLECTION_TRIPS
        - VITE_APPWRITE_COLLECTION_TRIP_STOPS
        - VITE_APPWRITE_COLLECTION_BOOKINGS
        - VITE_APPWRITE_COLLECTION_USER_ROLES
        - VITE_APPWRITE_COLLECTION_PRICING_RULES
        - VITE_APPWRITE_COLLECTION_PROFILES
        - VITE_APPWRITE_COLLECTION_DRIVERS
        - VITE_APPWRITE_COLLECTION_VEHICLES
        - VITE_APPWRITE_COLLECTION_TRIP_SEAT_RESERVATIONS
        - VITE_APPWRITE_DRIVER_DOCS_BUCKET_ID
        - VITE_APPWRITE_COLLECTION_HERO_BANNERS
        - VITE_APPWRITE_BANNERS_BUCKET_ID
        - VITE_GOOGLE_MAPS_API_KEY
    container_name: coolpool-frontend
    restart: unless-stopped
    networks:
      - coolify
    ports:
      - "8081:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coolpool.rule=Host(`coolpool.in`) || Host(`www.coolpool.in`)"
      - "traefik.http.routers.coolpool.entrypoints=http,https"
      - "traefik.http.services.coolpool.loadbalancer.server.port=80"
      - "traefik.http.routers.coolpool.tls=true"
      # Enable gzip compression via Traefik middleware
      - "traefik.http.middlewares.coolpool-compress.compress=true"
      - "traefik.http.routers.coolpool.middlewares=coolpool-compress"

  appwrite-proxy:
    image: nginx:alpine
    container_name: appwrite-proxy
    restart: unless-stopped
    networks:
      - coolify
      - ljdtlive600781krllbzu915
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coolpool-appwrite.rule=(Host(`coolpool.in`) || Host(`www.coolpool.in`)) && PathPrefix(`/v1`)"
      - "traefik.http.routers.coolpool-appwrite.priority=1000"
      - "traefik.http.routers.coolpool-appwrite.entrypoints=http,https"
      - "traefik.http.routers.coolpool-appwrite.tls=true"
      - "traefik.http.services.coolpool-appwrite.loadbalancer.server.port=80"

networks:
  coolify:
    external: true
  ljdtlive600781krllbzu915:
    external: true
